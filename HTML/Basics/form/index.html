<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <form action="index.php" method="POST" entype="multipart/form-data">
    <label for="name">Username:</label>
    <input type="text" id="name" minlength="6" maxlength="10" placeholder="Spongebob" required>
    <br>
    <label for="password">Password:</label>
     <input type="password" id="password" >
     <br>
    <label for="email">Email:</label>
     <input type="email" id="email" placeholder="abc@gmail.com">
     <br>
     <label for="phone">Phone:</label>
     <input type="tel" id="phone" placeholder="123-456-7890" pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}">
     <br>
     <label for="birth">Birthdate:</label>
     <input type="date" id="birth">
     <br>
    <label for="quantity">Quantity:</label>
    <input type="number" id="quantity" min="0" max="99" value="1">
    <br>
    <label for="title">Title:</label>

    <label for="Mr">Mr.</label>
    <input type="radio" id="Mr" value="Mr." name="title">
    <label for="Ms">Ms.</label>
    <input type="radio" id="Ms" value="Ms." name="title">
    <label for="PhD">PhD.</label>
    <input type="radio" id="PhD" value="PhD." name="title">
     <br>
    <label for = "payment">Payment:</label>
    <select>
        <option value="giftcard">Giftcard</option>
        <option value="visa">Visa</option>
        <option  value="mastercard">Mastercard</option>
    </select>
     <br>
     <label for="subscribe">Subscribe</label>
     <input type="checkbox" id="subscribe">
     <br>
     <label for="comments">Comments:</label>
     <textarea id="comments" rows="3" cols="25"></textarea>
     <br>
     <label for="file">File:</label>
     <input type="file" id="file" accept="image/png,image/jpeg">
     <br>
    <input type="Reset">
    <br>
    <input type="Submit">
    </form>
</body>
</html>
