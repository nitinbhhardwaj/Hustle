<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buttons</title>
</head>
<body>
    <button onclick="dosomething()" style="background-color:black;color:white;font-size:25px;padding:8px;border-radius:10px">Click me!</button>
    <p id="para">Hello</p>
    <script>
        let x=document.getElementById("para");
        function dosomething(){
            x.textContent="Goodbye";
        }
    </script>
</body>
</html>
